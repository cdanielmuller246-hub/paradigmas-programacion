<!DOCTYPE html>
<html>
<head>
 <title>Ejemplo de manejo de un evento</title>
</head>
<body>
<button id="miBoton">Hacer clic</button>
<script>
 // Seleccionamos el botón
 const boton = document.getElementById("miBoton");
 // Definimos el evento
 boton.addEventListener("click", function() {
 alert("¡Se hizo clic en el botón!");
 });
</script>
</body>
</html>
